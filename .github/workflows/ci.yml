name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで新しい push があれば実行中のものをキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [build, typecheck, lint, test]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

      # contract の JSON Schema(schema/*.json)は zod スキーマから生成される
      # コミット対象の中間表現。build 後に差分が残っていれば生成漏れ。
      - name: Check contract schema is up to date
        if: matrix.task == 'build'
        run: git diff --exit-code -- packages/contract/schema/

  # apps/desktop (Tauri v2 + crates/*) の Rust 品質ゲート。
  # 対象は apps/desktop workspace(crates/media-core, crates/contract-rs, src-tauri)。
  # Phase 2 Wave 1 で media-core に ffmpeg-next(ffmpeg-sys-next 経由で bindgen が
  # libclang を要求)を追加したため、clippy/test タスクは事前に FFmpeg(shared)を
  # 取得して FFMPEG_DIR を設定する(docs/phase2-0-windows-setup.md §2 参照。GPL shared
  # ビルドは検証専用。配布ビルドは Phase 4 で LGPL 構成に切り替える、deny.toml 冒頭
  # コメント参照)。fmt/deny/audit はコンパイルを伴わないため FFmpeg 取得をスキップする。
  rust:
    name: rust (${{ matrix.task }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, test, deny, audit]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      # clippy/test は media-core 経由で ffmpeg-next をビルド・リンクするため、
      # BtbN の FFmpeg n8.1 linux64-gpl-shared を取得してキャッシュする(検証専用の
      # GPL shared ビルド。配布は対象外、deny.toml 冒頭コメント参照)。
      - name: Cache FFmpeg (linux64 gpl shared)
        if: matrix.task == 'clippy' || matrix.task == 'test'
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: apps/desktop/.ffmpeg
          key: ffmpeg-n8.1-linux64-gpl-shared-8.1

      - name: Download FFmpeg (linux64 gpl shared)
        if: (matrix.task == 'clippy' || matrix.task == 'test') && steps.cache-ffmpeg-linux.outputs.cache-hit != 'true'
        run: |
          set -eu
          mkdir -p .ffmpeg-tmp
          curl -fsSL -o .ffmpeg-tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz
          mkdir -p .ffmpeg
          tar -xf .ffmpeg-tmp/ffmpeg.tar.xz -C .ffmpeg --strip-components=1
          rm -rf .ffmpeg-tmp

      # ffmpeg-sys-next のビルドスクリプト(bindgen)が libclang を要求する。
      - name: Install libclang (bindgen 用)
        if: matrix.task == 'clippy' || matrix.task == 'test'
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Set FFMPEG_DIR / LIBCLANG_PATH / LD_LIBRARY_PATH
        if: matrix.task == 'clippy' || matrix.task == 'test'
        run: |
          set -eu
          ffmpeg_dir="$(pwd)/.ffmpeg"
          echo "FFMPEG_DIR=$ffmpeg_dir" >> "$GITHUB_ENV"
          # cargo test は実行時にも共有ライブラリを解決する必要がある。
          echo "LD_LIBRARY_PATH=$ffmpeg_dir/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          libclang_dir="$(dirname "$(find /usr/lib -maxdepth 4 -name 'libclang.so*' 2>/dev/null | head -n1)")"
          echo "LIBCLANG_PATH=$libclang_dir" >> "$GITHUB_ENV"

      # cargo-deny / cargo-audit は prebuilt binary を配布しているツール
      # (taiki-e/install-action)で導入する。ソースからのビルドはコンパイル時間が
      # 重いため避ける。
      - name: Install cargo-deny / cargo-audit
        if: matrix.task == 'deny' || matrix.task == 'audit'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo fmt --check
        if: matrix.task == 'fmt'
        run: cargo fmt --check

      # facet-desktop (src-tauri) は Tauri v2 の Linux バックエンド依存として
      # gtk/webkit2gtk/gio 等の pkg-config 済みシステムライブラリ
      # (libwebkit2gtk-4.1-dev, libgtk-3-dev 等)を要求するが、この ubuntu
      # ランナーには未導入のため gio-sys/gobject-sys/glib-sys のビルドスクリプトが
      # 「Package gio-2.0 was not found in the pkg-config search path」で失敗する
      # (#17 実行時に確認: rust (clippy) / rust (test) が exit code 101 で失敗)。
      # rust-windows-check ジョブと同様に crates/* のみを対象にして回避する。
      # TODO(Phase 2 以降): facet-desktop 向けに Linux 依存を apt でセットアップし、
      # このジョブの対象へ facet-desktop を戻す(パッケージング整備のタイミングで
      # 着手するのが計画的にも自然。Phase 2 の検査対象は media-core が本丸)。
      - name: cargo clippy --workspace (facet-desktop は Linux 依存未整備のため除外)
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace --exclude facet-desktop -- -D warnings

      - name: cargo test --workspace (facet-desktop は Linux 依存未整備のため除外)
        if: matrix.task == 'test'
        run: cargo test --workspace --exclude facet-desktop

      # ライセンス検査: GPL/AGPL 系は allow リストに含めないことで既定 deny になる
      # (apps/desktop/deny.toml 参照)。
      # 注意: cargo-deny が判定できるのは Cargo.lock 経由の Rust クレートのみ。
      # media-core が実行時に動的リンクする FFmpeg 共有ライブラリの GPL/LGPL は
      # 対象外(配布ガードは Phase 4 課題。deny.toml 冒頭コメント参照)。
      - name: cargo deny check
        if: matrix.task == 'deny'
        run: cargo deny check

      - name: cargo audit
        if: matrix.task == 'audit'
        run: cargo audit

  # Windows ランナーでのビルド回帰チェック専用ジョブ。
  # GPU なしの CI VM では h264_amf / h264_mf の HW パス判定はできない
  # (実機判定は docs/phase2-0-windows-setup.md §7 参照)。ここでは
  # 「Windows(MSVC)向けに cargo check が通るか」というビルド・リンク回帰のみを見る。
  # Phase 2 Wave 1 で media-core に ffmpeg-next(ffmpeg-sys-next 経由で bindgen が
  # libclang を要求)が追加されたため、FFmpeg(shared)の取得 + FFMPEG_DIR /
  # LIBCLANG_PATH 設定を行う(検証専用の GPL shared ビルド。配布は Phase 4 で
  # LGPL 構成に切り替える、deny.toml 冒頭コメント参照)。
  rust-windows-check:
    name: rust (windows cargo check)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Cache FFmpeg (win64 gpl shared)
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: apps/desktop/.ffmpeg
          key: ffmpeg-n8.1-win64-gpl-shared-8.1

      - name: Download FFmpeg (win64 gpl shared)
        if: steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dest = "$PWD\.ffmpeg-tmp"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip" -OutFile "$dest\ffmpeg.zip"
          Expand-Archive -Path "$dest\ffmpeg.zip" -DestinationPath $dest -Force
          $inner = Get-ChildItem $dest -Directory | Select-Object -First 1 -ExpandProperty FullName
          Move-Item -Path $inner -Destination "$PWD\.ffmpeg"
          Remove-Item -Recurse -Force $dest

      # windows-latest ランナーには LLVM が既定でプリインストールされている
      # (C:\Program Files\LLVM。ランナーイメージの構成が変わった場合はここを更新する)。
      # ffmpeg-sys-next のビルドスクリプト(bindgen)が libclang を要求するため明示する。
      - name: Set FFMPEG_DIR / LIBCLANG_PATH / PATH
        shell: pwsh
        run: |
          $ffmpegDir = (Resolve-Path ".ffmpeg").Path
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      # facet-desktop (src-tauri) は Windows 向けビルド時に icons/icon.ico を要求するが
      # 現状 icons/icon.png のみで未整備(Phase 0/1 スキャフォルド時点の既知ギャップ、
      # Wave 0 のスコープ外)。crates/* のみを対象にして libav ビルド回帰を確認する。
      - name: cargo check (crates/* のみ、facet-desktop は icon.ico 未整備のため除外)
        run: cargo check --workspace --exclude facet-desktop
