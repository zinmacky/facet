name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで新しい push があれば実行中のものをキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [build, typecheck, lint, test]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

      # contract の JSON Schema(schema/*.json)は zod スキーマから生成される
      # コミット対象の中間表現。build 後に差分が残っていれば生成漏れ。
      - name: Check contract schema is up to date
        if: matrix.task == 'build'
        run: git diff --exit-code -- packages/contract/schema/
