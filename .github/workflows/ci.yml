name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで新しい push があれば実行中のものをキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN は読み取り専用で足りる(全ジョブがビルド・テストのみ)
permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [build, typecheck, lint, test]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

      # contract の JSON Schema(schema/*.json)は zod スキーマから生成される
      # コミット対象の中間表現。build 後に差分が残っていれば生成漏れ。
      - name: Check contract schema is up to date
        if: matrix.task == 'build'
        run: git diff --exit-code -- packages/contract/schema/

      # public(配布版)フロントビルドに投稿系コードが含まれないことを検査する
      # (edition-split, docs/desktop-migration-plan.md §6.6)。リフレーム画面
      # (features/upload/ReframeScreen.tsx)自体は両エディション共通で、投稿
      # (スケジュール・キャプション・IG/YT 連携)のみ private 専用ファイル群
      # (usePublishExtras.tsx が import する PostScheduleSection.tsx 等)に分離されている。
      # マーカーには features/upload/PostScheduleSection.tsx でのみ使われる UI 文字列
      # 「一括投稿」を使う — JS の関数/変数名は minify で読み替えられるため
      # 識別子は使わず、minify されても保持される文字列リテラルを見る
      # (単に "リフレーム"/"アップロード" だけだと StepIndicator の共有ラベル辞書等、
      # edition に関わらず常時コンパイルされる無害な文字列にもヒットし false positive になる)。
      # 資格情報設定 UI(features/publish-settings/、§11-3)についても同様に、
      # PublishSettingsSection.tsx でのみ使われる UI 文字列「APIトークン」を見る。
      - name: Build public frontend and check for upload-feature markers
        if: matrix.task == 'build'
        run: |
          set -eu
          # `pnpm --filter exec` はカレントディレクトリを apps/desktop に変えて実行するため、
          # --outDir は apps/desktop からの相対パスで指定する(リポジトリルート相対で
          # 書くと apps/desktop/apps/desktop/... に二重にネストしてしまう)。
          pnpm --filter @facet/desktop exec vite build --mode public --outDir dist-public-check
          assets_dir="apps/desktop/dist-public-check/assets"
          # assets/ が無い(ビルド構成が変わり生成先がずれた等)場合、直後の grep が
          # 単に「一致無し」と区別できず誤って合格扱いになるのを防ぐ。
          if [ ! -d "$assets_dir" ]; then
            echo "::error::$assets_dir が生成されていません(vite build の出力構成を確認してください)"
            exit 1
          fi
          if grep -rlE "一括投稿|APIトークン" "$assets_dir"; then
            echo "::error::public ビルドの成果物に投稿系マーカー(「一括投稿」/「APIトークン」)が含まれています"
            exit 1
          fi
          rm -rf apps/desktop/dist-public-check

  # apps/desktop (Tauri v2 + crates/*) の Rust 品質ゲート。
  # 対象は apps/desktop workspace(crates/media-core, crates/contract-rs, src-tauri)。
  # Phase 2 Wave 1 で media-core に ffmpeg-next(ffmpeg-sys-next 経由で bindgen が
  # libclang を要求)を追加したため、clippy/test/check-publish タスクは事前に
  # FFmpeg(shared)を取得して FFMPEG_DIR を設定する(docs/phase2-0-windows-setup.md
  # §2 参照。GPL shared ビルドは検証専用。配布ビルドは Phase 4 で LGPL 構成に切り替える、
  # deny.toml 冒頭コメント参照)。fmt/deny/audit はコンパイルを伴わないため FFmpeg
  # 取得をスキップする。
  # check-publish(v2.4 エディション分離): `publish` cargo feature を有効化しても
  # コンパイルが通ることを見る(private ビルド build:mac-private 相当のコンパイル
  # 回帰チェック。§src-tauri/Cargo.toml [features]、docs/desktop-migration-plan.md §6.6)。
  rust:
    name: rust (${{ matrix.task }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    strategy:
      fail-fast: false
      matrix:
        task: [fmt, clippy, check-publish, test, deny, audit]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      # clippy/test は media-core 経由で ffmpeg-next をビルド・リンクするため、
      # BtbN の FFmpeg n8.1 linux64-gpl-shared を取得してキャッシュする(検証専用の
      # GPL shared ビルド。配布は対象外、deny.toml 冒頭コメント参照)。
      - name: Cache FFmpeg (linux64 gpl shared)
        if: matrix.task == 'clippy' || matrix.task == 'test' || matrix.task == 'check-publish'
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: apps/desktop/.ffmpeg
          key: ffmpeg-n8.1-linux64-gpl-shared-8.1

      - name: Download FFmpeg (linux64 gpl shared)
        if: (matrix.task == 'clippy' || matrix.task == 'test' || matrix.task == 'check-publish') && steps.cache-ffmpeg-linux.outputs.cache-hit != 'true'
        run: |
          set -eu
          mkdir -p .ffmpeg-tmp
          curl -fsSL -o .ffmpeg-tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-linux64-gpl-shared-8.1.tar.xz
          mkdir -p .ffmpeg
          tar -xf .ffmpeg-tmp/ffmpeg.tar.xz -C .ffmpeg --strip-components=1
          rm -rf .ffmpeg-tmp

      # ffmpeg-sys-next のビルドスクリプト(bindgen)が libclang を要求する。
      # 併せて facet-desktop (src-tauri) のコンパイルに必要な Tauri v2 の Linux
      # バックエンド依存(gtk/webkit2gtk 等)も導入する(build-essential / curl /
      # wget / file はランナーに導入済み)。
      # https://v2.tauri.app/start/prerequisites/#linux
      - name: Install libclang (bindgen 用) + Tauri Linux dependencies
        if: matrix.task == 'clippy' || matrix.task == 'test' || matrix.task == 'check-publish'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libclang-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Set FFMPEG_DIR / LIBCLANG_PATH / LD_LIBRARY_PATH
        if: matrix.task == 'clippy' || matrix.task == 'test' || matrix.task == 'check-publish'
        run: |
          set -eu
          ffmpeg_dir="$(pwd)/.ffmpeg"
          echo "FFMPEG_DIR=$ffmpeg_dir" >> "$GITHUB_ENV"
          # cargo test は実行時にも共有ライブラリを解決する必要がある。
          echo "LD_LIBRARY_PATH=$ffmpeg_dir/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          libclang_dir="$(dirname "$(find /usr/lib -maxdepth 4 -name 'libclang.so*' 2>/dev/null | head -n1)")"
          echo "LIBCLANG_PATH=$libclang_dir" >> "$GITHUB_ENV"

      # cargo-deny / cargo-audit は prebuilt binary を配布しているツール
      # (taiki-e/install-action)で導入する。ソースからのビルドはコンパイル時間が
      # 重いため避ける。
      - name: Install cargo-deny / cargo-audit
        if: matrix.task == 'deny' || matrix.task == 'audit'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit

      - name: cargo fmt --check
        if: matrix.task == 'fmt'
        run: cargo fmt --check

      - name: cargo clippy --workspace
        if: matrix.task == 'clippy'
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test --workspace
        if: matrix.task == 'test'
        run: cargo test --workspace

      - name: cargo check --workspace --features publish
        if: matrix.task == 'check-publish'
        run: cargo check --workspace --features publish

      # commands::publish のテスト(§11-3)は CredentialStore をトレイト分離しており、
      # 実 OS キーチェーンに触れるテストのみ #[ignore] で隔離済み(ubuntu ランナーには
      # Secret Service が無く不安定なため)。ignore されていないテストは HTTP をループバック
      # 上でモックするのみでキーチェーンに触れないため、ここで実行して安全。
      - name: cargo test --workspace --features publish
        if: matrix.task == 'check-publish'
        run: cargo test --workspace --features publish

      # ライセンス検査: GPL/AGPL 系は allow リストに含めないことで既定 deny になる
      # (apps/desktop/deny.toml 参照)。
      # 注意: cargo-deny が判定できるのは Cargo.lock 経由の Rust クレートのみ。
      # media-core が実行時に動的リンクする FFmpeg 共有ライブラリの GPL/LGPL は
      # 対象外(配布ガードは Phase 4 課題。deny.toml 冒頭コメント参照)。
      - name: cargo deny check
        if: matrix.task == 'deny'
        run: cargo deny check

      - name: cargo audit
        if: matrix.task == 'audit'
        run: cargo audit

  # Windows ランナーでのビルド回帰チェック専用ジョブ。
  # GPU なしの CI VM では h264_amf / h264_mf の HW パス判定はできない
  # (実機判定は docs/phase2-0-windows-setup.md §7 参照)。ここでは
  # 「Windows(MSVC)向けに cargo check が通るか」というビルド・リンク回帰のみを見る。
  # Phase 2 Wave 1 で media-core に ffmpeg-next(ffmpeg-sys-next 経由で bindgen が
  # libclang を要求)が追加されたため、FFmpeg(shared)の取得 + FFMPEG_DIR /
  # LIBCLANG_PATH 設定を行う(検証専用の GPL shared ビルド。配布は Phase 4 で
  # LGPL 構成に切り替える、deny.toml 冒頭コメント参照)。
  rust-windows-check:
    name: rust (windows cargo check)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      - name: Cache FFmpeg (win64 gpl shared)
        id: cache-ffmpeg-windows
        uses: actions/cache@v4
        with:
          path: apps/desktop/.ffmpeg
          key: ffmpeg-n8.1-win64-gpl-shared-8.1

      - name: Download FFmpeg (win64 gpl shared)
        if: steps.cache-ffmpeg-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dest = "$PWD\.ffmpeg-tmp"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-gpl-shared-8.1.zip" -OutFile "$dest\ffmpeg.zip"
          Expand-Archive -Path "$dest\ffmpeg.zip" -DestinationPath $dest -Force
          $inner = Get-ChildItem $dest -Directory | Select-Object -First 1 -ExpandProperty FullName
          Move-Item -Path $inner -Destination "$PWD\.ffmpeg"
          Remove-Item -Recurse -Force $dest

      # windows-latest ランナーには LLVM が既定でプリインストールされている
      # (C:\Program Files\LLVM。ランナーイメージの構成が変わった場合はここを更新する)。
      # ffmpeg-sys-next のビルドスクリプト(bindgen)が libclang を要求するため明示する。
      - name: Set FFMPEG_DIR / LIBCLANG_PATH / PATH
        shell: pwsh
        run: |
          $ffmpegDir = (Resolve-Path ".ffmpeg").Path
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "$ffmpegDir\bin" >> $env:GITHUB_PATH

      - name: cargo check --workspace
        run: cargo check --workspace

  # macOS ランナーでのビルド回帰チェック専用ジョブ(docs/mac-handover.md §4-1)。
  # Mac が開発の主系になったため、Homebrew FFmpeg + pkg-config 経由のリンクで
  # media-core(および src-tauri)が Mac 上でも build/test できることを CI で守る。
  # HW エンコード(videotoolbox)の実機検証(docs/mac-handover.md §4-2)は CI VM では
  # できないため対象外 — ここでは cfg(target_os = "macos") 経路も含めた
  # ビルド・リンク・非 ignored テストの回帰のみを見る。
  # TS 側(pnpm test 等)は OS 非依存(§2 の検証状態マトリクス参照)なので ubuntu の
  # check job と重複させず省く。fmt/clippy/deny/audit も Rust レベルのチェックで
  # OS 非依存なため ubuntu の rust job に委ね、ここでは重複させない。
  rust-macos-check:
    name: rust (macos cargo test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Mac では FFMPEG_DIR は不要 — Homebrew の ffmpeg は pkg-config 経由で自動的に
      # リンクされる(docs/mac-handover.md §3)。rust-cache より先にインストールするのは、
      # 正確なバージョン(リビジョン込み)をキャッシュキーに含めるため(下記)。
      - name: Install FFmpeg (Homebrew)
        run: brew install ffmpeg

      # ffmpeg-next 8.1 は FFmpeg 8.x のヘッダを要求する。macos-latest ランナーの
      # Homebrew ffmpeg フォーミュラが常に 8.x を配っているとは限らないため明示的に
      # 検証する(フォーミュラが古い/新しい場合はここで早期に気づける)。
      - name: Verify FFmpeg version
        id: ffmpeg
        run: |
          set -eu
          ffmpeg -version
          major="$(ffmpeg -version | head -n1 | sed -nE 's/^ffmpeg version ([0-9]+)\..*/\1/p')"
          if [ "$major" != "8" ]; then
            echo "::error::Homebrew ffmpeg is ${major:-unknown}.x, but ffmpeg-next 8.1 requires FFmpeg 8.x headers. Pin/update the Homebrew formula (or this check) accordingly."
            exit 1
          fi
          # リビジョン込みの正確なバージョン(例: "ffmpeg 8.1.2_1")をキャッシュキー用に出力
          echo "version=$(brew list --versions ffmpeg | tr ' ' '-')" >> "$GITHUB_OUTPUT"

      # ffmpeg-sys-next のビルドスクリプト出力は Homebrew Cellar の実パス
      # (/opt/homebrew/Cellar/ffmpeg/<バージョン_リビジョン>/lib)を埋め込む。
      # formula が bump されるとパスが変わり、古いキャッシュのリンク探索パスが
      # 死んで `ld: library 'avutil' not found` になる(2026-07-13 の 8.1.2→8.1.2_1
      # bump で実際に発生)。キーに正確なバージョンを含め、bump 時は作り直させる。
      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target
          key: ${{ steps.ffmpeg.outputs.version }}

      - name: cargo test --workspace
        run: cargo test --workspace
