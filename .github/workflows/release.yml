name: Release

# タグ v* の push で本番リリースが起動する(Phase 4 Wave D)。
# バージョンの単一ソースは apps/desktop/src-tauri/tauri.conf.json。
# タグはこの値と "v" プレフィックスで一致させる運用(scripts/check-release-version.ps1
# が機械検証する。docs/phase4-packaging.md「リリース手順」参照)。
#
# workflow_dispatch はドライラン専用の手動起動口。PowerShell スクリプト群・LGPL FFmpeg
# 取得・license-gate 二重検証・tauri-action という通常の CI(ci.yml)を通らない経路が
# 本番タグ push で初めて検証される問題があり(v0.1.0 で実際に3回失敗した経緯が下の
# コメントに残っている)、任意のブランチから同じ経路を事前検証できるようにする。
# dry_run 入力(既定 true)は「署名鍵(TAURI_SIGNING_PRIVATE_KEY)を要する updater 署名と
# GitHub Release の作成」だけをスキップし、それ以外(FFmpeg 取得・license-gate・
# エディション分離ゲート・NSIS ビルド・成果物検査)は本番と同一の経路を通す。
# dry_run=false は実タグの ref(例: `gh workflow run release.yml --ref v0.1.0`)に対して
# 手動起動し、タグ再送なしに本番同様(署名 + draft release 作成)を再実行するための
# 用途(CI インフラ起因の失敗からの復旧用)。ブランチ ref に対して dry_run=false で
# 起動すると github.ref_name がタグ形式にならず、通常どおり手順3でバージョン整合
# チェックが fail する(これは意図した安全側の挙動)。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          true(既定): 署名鍵と GitHub Release 作成をスキップして検証のみ行う。
          false: 実タグ ref に対して手動起動し、署名・draft release 作成まで本番同様に行う
          (タグ再送なしの再実行用)。
        type: boolean
        default: true

# GitHub Release(draft)の作成・アセットのアップロードに必要。
permissions:
  contents: write

# 同一タグ(または同一 ref)に対する再実行があれば実行中のものをキャンセルする。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & draft release (Windows / LGPL FFmpeg)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    # workflow_dispatch かつ dry_run 入力が true(既定)の場合のみドライランとする。
    # push(タグ)イベントでは inputs.dry_run は null になるが、&& の短絡評価で
    # 左辺が false のため式全体が false となり、env は文字列 "false" になる。
    env:
      IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    steps:
      # --- 1. checkout + pnpm/Node セットアップ + 依存インストール(ci.yml と同形) ---
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- 2. バージョン整合チェック対象タグの決定 ---
      # 通常(タグ push / タグ ref への手動起動)は github.ref_name(タグ名)をそのまま使う。
      # ドライラン(ブランチからの workflow_dispatch)には実タグが存在しないため、
      # tauri.conf.json(バージョン単一ソース)自身のバージョンから合成タグを組み立てる。
      # これにより check-release-version.ps1 自体は変更せず、タグ形式検証はスキップしつつ
      # tauri.conf.json / package.json / Cargo.toml 間の一致検証だけは実タグ push と同様に行う。
      - name: Resolve version-check tag
        id: version-check-tag
        run: |
          if ($env:IS_DRY_RUN -eq "true") {
            $tauriConf = Get-Content -Raw "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
            $tag = "v$($tauriConf.version)"
            Write-Host "dry run: 実タグが無いため tauri.conf.json のバージョンから合成タグを使用します: $tag"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      # --- 3. タグとバージョン単一ソース(tauri.conf.json)の一致チェック ---
      # 不一致なら即 fail する(scripts/check-release-version.ps1)。
      - name: Check tag matches version (tauri.conf.json / package.json / Cargo.toml)
        run: ./scripts/check-release-version.ps1 -Tag "${{ steps.version-check-tag.outputs.tag }}"

      # --- 4. Rust toolchain + rust-cache + LIBCLANG_PATH(rust-windows-check と同形) ---
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop -> target

      # windows-latest ランナーには LLVM が既定でプリインストールされている
      # (C:\Program Files\LLVM。ci.yml の rust-windows-check ジョブと同じ前提)。
      # ffmpeg-sys-next のビルドスクリプト(bindgen)が libclang を要求するため明示する。
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      # --- 5. LGPL FFmpeg 取得 + ffmpeg-dist ステージング + FFMPEG_DIR 設定 ---
      # scripts/fetch-ffmpeg-lgpl.ps1 は BtbN の日付固定タグ(pin)から win64-lgpl-shared
      # を取得し、apps/desktop/src-tauri/ffmpeg-dist/ に DLL のみをステージングする
      # (docs/phase4-packaging.md、THIRD_PARTY_NOTICES.md §1)。標準出力の最終行が
      # 展開ルート(FFMPEG_DIR に指定すべきパス)。
      - name: Fetch LGPL FFmpeg + stage ffmpeg-dist
        run: |
          # fetch-ffmpeg-lgpl.ps1 はネイティブコマンドを呼ばないため $LASTEXITCODE は
          # 設定されない($null -ne 0 が真になり exit 0 で静かに抜ける事故が v0.1.0 の
          # 初回リリースビルドで実際に発生)。エラーは throw で伝播するので、戻り値の
          # 実在検証で成否を判定する。@()[-1] は将来出力が複数行になっても最終行=パス
          # の契約を守るため。
          $lgplRoot = @(./scripts/fetch-ffmpeg-lgpl.ps1)[-1]
          if (-not $lgplRoot -or -not (Test-Path $lgplRoot)) {
            throw "fetch-ffmpeg-lgpl.ps1 が有効な展開ルートを返しませんでした: '$lgplRoot'"
          }
          Write-Host "LGPL root: $lgplRoot"
          echo "FFMPEG_DIR=$lgplRoot" >> $env:GITHUB_ENV

      # --- 6. ライセンス適合ゲート(tauri build より前。fail で全停止) ---
      # PATH を ffmpeg-dist に絞って license-gate を実行し、実際に LGPL DLL に
      # リンクされ GPL/nonfree コンポーネントを含まないことを機械検証する
      # (apps/desktop/crates/license-gate、THIRD_PARTY_NOTICES.md 末尾)。
      - name: Run license gate (LGPL FFmpeg conformance)
        run: ./scripts/run-license-gate.ps1

      # --- 7. ワークスペース依存(contract の schema/dist、core の dist)を先にビルド ---
      # apps/desktop の beforeBuildCommand(vite build)は @facet/contract /
      # @facet/core の dist/ を解決する。tauri-action は projectPath 配下でしか
      # コマンドを実行しないため、依存パッケージのビルドはここで事前に行う。
      - name: Build workspace dependencies (@facet/contract, @facet/core)
        run: pnpm --filter "@facet/desktop^..." build

      # --- 8. エディション分離ゲート: マーカー実在の事前検査(tauri build より前) ---
      # GHSA-39fc-vq56-xx99: 下(手順9)のビルド後 grep が使うマーカー文字列は
      # リファクタで改名されると黙って空振り(常に「一致無し」= 合格)する。
      # ビルドの前にマーカーがソース側に実在することを検査し、改名時はここで
      # fail させて更新を強制する(ci.yml の同名ステップと同じ趣旨)。
      - name: Verify upload-feature markers still exist in source
        run: |
          $ErrorActionPreference = "Stop"
          $markers = "一括投稿", "APIトークン", "クライアントID", "YouTube の認可が無効"
          $srcFiles = Get-ChildItem -Path "apps/desktop/src" -Recurse -File
          foreach ($marker in $markers) {
            if (-not ($srcFiles | Select-String -Pattern $marker -SimpleMatch -Quiet)) {
              Write-Error "マーカー文字列「$marker」が apps/desktop/src に見つかりません(リネームされた場合は本ワークフローと ci.yml の検査対象も更新してください)"
              exit 1
            }
          }

      # --- 9. エディション分離ゲート(tauri build より前。fail で全停止) ---
      # public(配布版)フロントビルドに投稿系コードが含まれないことを検査する
      # (edition-split, docs/desktop-migration-plan.md §6.6)。win-release は
      # tauri.conf.json の既定 beforeBuildCommand(`vite build --mode public`)を
      # そのまま使う(§tauri.conf.json)ため、ここで独立に同じ `--mode public` で
      # ビルドした dist/ を検査すれば、直後の tauri-action(手順10)が生成する
      # 実際のバンドルの中身と同一の内容を事前に確認できる。リフレーム画面
      # (features/upload/ReframeScreen.tsx)自体は両エディション共通で、投稿
      # (スケジュール・キャプション・IG/YT 連携)のみ private 専用ファイル群に分離
      # されている。マーカーには features/upload/PostScheduleSection.tsx でのみ
      # 使われる UI 文字列「一括投稿」を使う(JS 識別子は minify で読み替えられるため使わない)。
      # 資格情報設定 UI(features/publish-settings/、§11-3)も同様に、
      # PublishSettingsSection.tsx でのみ使われる UI 文字列「APIトークン」を見る。
      # YouTube 連携(§6.5)も同様に「クライアントID」「YouTube の認可が無効」を見る。
      # GHSA-39fc-vq56-xx99: ci.yml と非対称(こちらは *.js のみ・2マーカー)だった
      # ため、ci.yml と同じ4マーカー・assets ディレクトリ全体(*.js に限らない)の
      # 検査に揃え、release は ci に needs しない(v* タグ push では ci が起動しない)
      # 運用でも同等の強度を持たせる。JP UI 文字列マーカーは改名で素通りし得るため、
      # 投稿系エンドポイント文字列(R2/Cloudflare, IG Graph API, YouTube Data API)の
      # 負ガードでも補強する。
      - name: Verify public frontend excludes upload-feature markers
        run: |
          $ErrorActionPreference = "Stop"
          pnpm --filter @facet/desktop exec vite build --mode public --outDir dist-edition-check
          $assetsDir = "apps/desktop/dist-edition-check/assets"
          if (-not (Test-Path $assetsDir)) {
            Write-Error "$assetsDir が生成されていません(vite build の出力構成を確認してください)"
            exit 1
          }
          $assetFiles = Get-ChildItem -Path $assetsDir -Recurse -File
          # assets/ 配下にファイルが1つも無い(ビルド構成が変わり生成先がずれた等)
          # 場合、直後の Select-String が単に「一致無し」と区別できず誤って合格
          # 扱いになるのを防ぐ。
          if (-not $assetFiles) {
            Write-Error "$assetsDir にファイルが見つかりません(vite build の出力構成を確認してください)"
            exit 1
          }

          # 失敗時の調査用に、一致したマーカーごとにファイル・行番号・一致箇所前後80文字を
          # 出力する(バンドル JS は1行が巨大なため、Select-String の結果をそのまま
          # 出すと数百KB出力されてしまう)。あわせて成果物ファイル一覧(名前・サイズ)も
          # 出力する。$ErrorActionPreference = "Stop" の下では Write-Error 呼び出し時点で
          # スクリプトが即終了する(以降の行は実行されない)ため、必ず Write-Error より
          # 前に呼び出すこと。
          function Write-MarkerDiagnostics($selectMatches, $files) {
            Write-Host "--- 一致箇所(前後80文字) ---"
            foreach ($m in $selectMatches) {
              foreach ($match in $m.Matches) {
                $start = [Math]::Max(0, $match.Index - 80)
                $end = [Math]::Min($m.Line.Length, $match.Index + $match.Length + 80)
                $snippet = $m.Line.Substring($start, $end - $start)
                Write-Host "  [$($match.Value)] $($m.Path):$($m.LineNumber) ...${snippet}..."
              }
            }
            Write-Host "--- 成果物ファイル一覧 ---"
            foreach ($f in $files) {
              Write-Host ("  {0}  {1} bytes" -f $f.Name, $f.Length)
            }
          }

          $uploadMarkers = "一括投稿", "APIトークン", "クライアントID", "YouTube の認可が無効"
          # -AllMatches: 巨大な1行に複数マーカーが出現しても取りこぼさず全て診断に出す
          $uploadMatches = $assetFiles | Select-String -Pattern $uploadMarkers -SimpleMatch -AllMatches
          if ($uploadMatches) {
            Write-MarkerDiagnostics $uploadMatches $assetFiles
            Write-Error "public ビルドの成果物に投稿系マーカー(「一括投稿」/「APIトークン」/「クライアントID」/「YouTube の認可が無効」)が含まれています"
            exit 1
          }
          $endpointMarkers = "googleapis", "cloudflarestorage", "graph.facebook"
          $endpointMatches = $assetFiles | Select-String -Pattern $endpointMarkers -SimpleMatch -AllMatches
          if ($endpointMatches) {
            Write-MarkerDiagnostics $endpointMatches $assetFiles
            Write-Error "public ビルドの成果物に投稿系エンドポイント文字列(googleapis/cloudflarestorage/graph.facebook)が含まれています"
            exit 1
          }
          Write-Host "OK: public フロントビルドに投稿系マーカー/エンドポイント文字列は含まれていない"
          Remove-Item -Recurse -Force "apps/desktop/dist-edition-check"

      # --- 10. tauri-action(署名付きビルド + GitHub Release draft 作成。ドライラン時は署名/公開なしのビルド検証のみ) ---
      # tauri.win-release.conf.json をオーバーレイし、LGPL FFmpeg の DLL と
      # LICENSES/COPYING.LGPLv3 を exe 隣接にバンドルする(Wave A/B)。
      # TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) が未設定だとこのステップで失敗する
      # (初回リリース前チェックリスト、docs/phase4-packaging.md 参照)。
      #
      # ドライラン分岐(tauri-action@v1 の src/index.ts を確認: tagName / releaseId が
      # 共に未指定なら getOrCreateRelease もアセットアップロードも呼ばれず、
      # 「No releaseId or tagName provided, skipping all uploads...」でビルドのみ成功する。
      # つまり GitHub Release 関連の入力を空文字にするだけで publish 系動作を安全に
      # 抑止できるため、tauri-action 自体は分岐せず同じアクションを使う):
      #   - args: 本番と同じ tauri.win-release.conf.json を常に使い、ドライラン時のみ
      #     tauri.win-release-dryrun.conf.json(bundle.createUpdaterArtifacts=false のみ)を
      #     追加でマージする(tauri CLI の --config は複数指定可で指定順にマージされる)。
      #     updater 署名(.sig)を要求しないビルドになるが、NSIS ビルド自体・
      #     bundle.resources(FFmpeg DLL / COPYING.LGPLv3)は本番と同一のまま。
      #   - tagName / releaseName を空文字にし、publish 動作を止める。
      #   - 署名鍵の env も空にする(createUpdaterArtifacts=false のため未使用だが、
      #     不要な secrets 参照を避ける意図で明示的に空にする)。
      #
      # 式の注意: GitHub Actions の式では空文字 '' は falsy のため、
      # `cond && '' || 'x'` は cond が真でも 'x' を返してしまう。三項の真側には
      # 必ず非空(truthy)の値を置く形(`反転条件 && '非空値' || ''`)で書くこと。
      - name: Build & publish draft release (tauri-action)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.IS_DRY_RUN != 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.IS_DRY_RUN != 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/desktop
          # tauri-action は projectPath 内の lockfile でパッケージマネージャを自動判定
          # するが、pnpm workspace の lockfile はリポジトリルートにあるため npm に
          # フォールバックし `npm run tauri` が Missing script で失敗する(v0.1.0 の
          # 2回目ビルドで実際に発生)。pnpm 経由で tauri CLI を起動するよう明示する。
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.win-release.conf.json${{ env.IS_DRY_RUN == 'true' && ' --config src-tauri/tauri.win-release-dryrun.conf.json' || '' }}
          tagName: ${{ env.IS_DRY_RUN != 'true' && 'v__VERSION__' || '' }}
          releaseName: ${{ env.IS_DRY_RUN != 'true' && 'Facet desktop v__VERSION__' || '' }}
          releaseBody: |
            Facet desktop v__VERSION__

            インストーラ(NSIS, .exe)をダウンロードして実行してください。
            初回起動時に SmartScreen の警告が出る場合は「詳細情報」→「実行」を選択してください
            (署名なし配布のため。README.md 参照)。
          releaseDraft: true
          prerelease: ${{ env.IS_DRY_RUN != 'true' && contains(github.ref_name, '-') }}

      # --- 11. 成果物検査: NSIS インストーラ(setup.exe)を 7z で展開し、LGPL DLL のみが
      #     同梱されていること(GPL 実行ファイルの混入がないこと)を機械検証する。
      #     これは「配布物そのもの」に対する検査であり、6 のビルド前ゲートとは
      #     独立した二重防御。ドライランでも(署名検証を除き)同じ検査をすべて実行する。
      #     注: Tauri v2 の createUpdaterArtifacts は setup.exe 自体に .sig を添える
      #     形式で、v1 の *.nsis.zip は生成されない(v0.1.0 の3回目ビルドで確認)。
      #     また cargo workspace のルートは apps/desktop のため、バンドル出力は
      #     apps/desktop/target/(src-tauri/target/ ではない)。 ---
      - name: Inspect release artifacts (bundled DLLs)
        run: |
          $ErrorActionPreference = "Stop"
          $bundleDir = "apps/desktop/target/release/bundle/nsis"
          $setup = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" -File | Select-Object -First 1
          if (-not $setup) {
            Write-Error "NSIS インストーラ (*-setup.exe) が見つかりません: $bundleDir"
            exit 1
          }
          Write-Host "検査対象: $($setup.FullName)"

          # updater 署名(.sig)が生成されていることを確認(createUpdaterArtifacts)。
          # ドライランは tauri.win-release-dryrun.conf.json で createUpdaterArtifacts を
          # false にしており(署名鍵不要のため).sig は生成されない。ここのみスキップする。
          if ($env:IS_DRY_RUN -eq "true") {
            Write-Host "dry run: updater 署名 (.sig) の検証はスキップします(createUpdaterArtifacts=false)"
          } elseif (-not (Test-Path "$($setup.FullName).sig")) {
            Write-Error "updater 署名 (.sig) が見つかりません: $($setup.FullName).sig"
            exit 1
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "release-artifact-inspect"
          if (Test-Path $extractDir) { Remove-Item -Recurse -Force $extractDir }
          # 7z(windows-latest に同梱)で NSIS インストーラのペイロードを展開する。
          7z x $setup.FullName "-o$extractDir" -y | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Error "7z による setup.exe の展開に失敗しました (exit code $LASTEXITCODE)"
            exit 1
          }

          # インストーラは入れ子ディレクトリ($PLUGINSDIR 等)を含むため exe を機械的に探す。
          $exe = Get-ChildItem -Path $extractDir -Recurse -Filter "facet-desktop.exe" -File | Select-Object -First 1
          if (-not $exe) {
            Write-Error "展開後に facet-desktop.exe が見つかりません: $extractDir"
            exit 1
          }
          $appDir = $exe.DirectoryName
          Write-Host "アプリディレクトリ: $appDir"

          # ffmpeg-dist にステージングした DLL 名を期待リストとする(ハードコード禁止)。
          $expectedDlls = Get-ChildItem -Path "apps/desktop/src-tauri/ffmpeg-dist" -Filter "*.dll" -File | Select-Object -ExpandProperty Name
          $bundledDlls = Get-ChildItem -Path $appDir -Filter "*.dll" -File | Select-Object -ExpandProperty Name

          $missing = $expectedDlls | Where-Object { $_ -notin $bundledDlls }
          if ($missing) {
            Write-Error "配布物に含まれるべき DLL が見つかりません: $($missing -join ', ')"
            exit 1
          }
          Write-Host "OK: 期待する DLL がすべて同梱されている ($($expectedDlls -join ', '))"

          # ffmpeg.exe / ffprobe.exe 等の実行ファイル混入がないことを確認
          # (fetch-ffmpeg-lgpl.ps1 の防御と同じ趣旨を配布物側でも二重に確認する)。
          # uninstall.exe は NSIS が標準生成するアンインストーラで正当な同梱物
          # (インストーラ本体を 7z 展開する方式にしたことで検査対象に現れるようになった)。
          $allowedExe = @("facet-desktop.exe", "uninstall.exe")
          $leakedExe = Get-ChildItem -Path $appDir -Filter "*.exe" -File | Where-Object { $_.Name -notin $allowedExe }
          if ($leakedExe) {
            Write-Error "配布物に想定外の実行ファイルが混入しています: $($leakedExe.Name -join ', ')"
            exit 1
          }

          # COPYING.LGPLv3 が同梱されていることを確認(tauri.win-release.conf.json の resources)。
          if (-not (Test-Path (Join-Path $appDir "COPYING.LGPLv3"))) {
            Write-Error "COPYING.LGPLv3 が配布物に同梱されていません: $appDir"
            exit 1
          }

          # license-gate を配布物ディレクトリそのものに対して再実行し、実際に
          # LGPL 構成(GPL/nonfree コンポーネント不在)であることを最終確認する。
          Write-Host "配布物ディレクトリに対して license-gate を再実行します"
          ./scripts/run-license-gate.ps1 -FfmpegDistPath $appDir
          if ($LASTEXITCODE -ne 0) {
            Write-Error "配布物に対する license-gate 再検証に失敗しました"
            exit $LASTEXITCODE
          }
