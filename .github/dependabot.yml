version: 2
updates:
  # npm(pnpm ワークスペース)。ルートの pnpm-lock.yaml を基準に更新する。
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # メジャー更新は自動 PR を出さない(patch/minor のみ)。
    # 破壊的変更を含むメジャーは計画的に手動で対応する。
    # セキュリティ修正はリポジトリの Dependabot security updates が別途担う。
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # PR ノイズを抑えるため dev/prod でまとめる
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # GitHub Actions の workflow で使う action も更新対象にする
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"

  # apps/desktop の Rust workspace(crates/media-core, crates/contract-rs, src-tauri)。
  # Cargo.lock を基準に更新する。
  - package-ecosystem: cargo
    directory: "/apps/desktop"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # メジャー更新は自動 PR を出さない(npm の設定と同方針)。tauri 本体は破壊的変更を
    # 伴いやすく計画的に手動更新するため、バージョン問わず ignore する。
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tauri"
      - dependency-name: "tauri-build"
      - dependency-name: "tauri-plugin-*"
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
