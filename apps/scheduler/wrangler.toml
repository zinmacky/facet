name = "reframe-scheduler"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1: ジョブの永続ストア。database_id はデプロイ環境ごとに差し替える。
[[d1_databases]]
binding = "DB"
database_name = "reframe-jobs"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "migrations"

# KV: Instagram 長期トークン(ig_long_lived)の保管に使う。
[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_ID"

# Durable Object: 1ジョブ = 1インスタンスで公開ステートマシンを直列化する。
[[durable_objects.bindings]]
name = "PUBLISH_DO"
class_name = "PublishDO"

[[migrations]]
tag = "v1"
new_classes = ["PublishDO"]

# 毎分 = 公開時刻の到来スキャン、毎日3時 = IG トークン更新。
[triggers]
crons = ["* * * * *", "0 3 * * *"]

[vars]
IG_USER_ID = ""
IG_APP_ID = ""
R2_PUBLIC_BASE = "https://media.dysalgia.com"
GRAPH_VERSION = "v21.0"
MAX_ATTEMPTS = "5"

# シークレット類は vars に置かず wrangler secret で投入する:
#   wrangler secret put IG_APP_SECRET
