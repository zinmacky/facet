name = "facet-scheduler"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1: ジョブの永続ストア。database_id はデプロイ環境ごとに差し替える。
[[d1_databases]]
binding = "DB"
database_name = "facet-jobs"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "migrations"

# KV: Instagram 長期トークン(ig_long_lived)の保管に使う。
[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_ID"

# Durable Object: 1ジョブ = 1インスタンスで公開ステートマシンを直列化する。
[[durable_objects.bindings]]
name = "PUBLISH_DO"
class_name = "PublishDO"

[[migrations]]
tag = "v1"
new_classes = ["PublishDO"]

# 毎分 = 公開時刻の到来スキャン、毎日3時 = IG トークン更新。
[triggers]
crons = ["* * * * *", "0 3 * * *"]

[vars]
IG_USER_ID = ""
IG_APP_ID = ""
R2_PUBLIC_BASE = "https://media.dysalgia.com"
GRAPH_VERSION = "v21.0"
MAX_ATTEMPTS = "8"

# シークレット類は vars に置かず wrangler secret で投入する:
#   wrangler secret put IG_APP_SECRET
#   wrangler secret put SCHEDULER_API_TOKEN
# SCHEDULER_API_TOKEN: /health を除く全公開エンドポイントの Bearer 認証トークン。
# 未投入(fail-closed)だと保護対象エンドポイントは全て 503 を返す。デプロイ時に
# ランダムな値を生成して投入し、desktop 側の設定画面(OS キーチェーン保管)にも
# 同じ値を登録する。
