# apps/desktop の Rust ワークスペース(crates/* + src-tauri)向け cargo-deny 設定。
# CI: .github/workflows/ci.yml の `cargo deny check` から実行する。
#
# 重要な限界: cargo-deny が判定できるのは Cargo.toml/Cargo.lock 経由でリンクされる
# **Rust クレートのライセンス**のみ。media-core が実行時に動的リンクする FFmpeg の
# 共有ライブラリ(FFMPEG_DIR 経由。ffmpeg-next を追加する Wave 1 以降で発生)の
# GPL/LGPL ライセンスはこの設定の対象外であり、cargo-deny では判定できない。
# 配布ビルド時に GPL コンポーネント非同梱・LGPL 動的リンクのみを強制するガードは
# Phase 4 の課題(docs/desktop-migration-plan.md §5・§8 参照)。

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# cargo audit (RUSTSEC advisories) は別ステップ(cargo audit コマンド)で実行するため、
# ここでの advisories チェックは deny-by-default とし、既知の unmaintained 警告のみ
# 個別に無視する。いずれも tauri / wry の推移的依存で、Facet 側で直接更新できない
# (上流の更新待ち)。脆弱性(vulnerability)ではなく「保守停止」の通知であるため、
# 実害が出るまでは無視して CI を安定させる。
[advisories]
ignore = [
	# GTK3 bindings(gtk-rs)。Linux 版 tauri/wry が使用。GTK4 移行は上流(tauri)側の対応待ち。
	{ id = "RUSTSEC-2024-0411", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0412", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0413", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0414", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0415", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0416", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0417", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0418", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0419", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	{ id = "RUSTSEC-2024-0420", reason = "tauri/wry の推移的依存(gtk-rs GTK3)。上流更新待ち" },
	# proc-macro-error は多数のマクロクレートが依存する定番だが保守停止。ビルド専用
	# (実行時コード非同梱)で影響は軽微。
	{ id = "RUSTSEC-2024-0370", reason = "tauri 系マクロの推移的依存。ビルド専用で実行時影響なし" },
	# unic-* (rust-unic) は urlpattern 経由の tauri-utils 依存。Unicode 識別子処理のみで
	# セキュリティ影響は小さいと判断。上流(tauri)の urlpattern 更新待ち。
	{ id = "RUSTSEC-2025-0075", reason = "tauri-utils(urlpattern)の推移的依存。上流更新待ち" },
	{ id = "RUSTSEC-2025-0080", reason = "tauri-utils(urlpattern)の推移的依存。上流更新待ち" },
	{ id = "RUSTSEC-2025-0081", reason = "tauri-utils(urlpattern)の推移的依存。上流更新待ち" },
	{ id = "RUSTSEC-2025-0098", reason = "tauri-utils(urlpattern)の推移的依存。上流更新待ち" },
	{ id = "RUSTSEC-2025-0100", reason = "tauri-utils(urlpattern)の推移的依存。上流更新待ち" },
]

[licenses]
confidence-threshold = 0.8
# 許可ライセンス。GPL / AGPL 系はここに含めない = デフォルトで deny される
# (cargo-deny のライセンスチェックは allow リストに無いものを既定で拒否するため、
# 明示的な deny リストは不要)。
allow = [
	"MIT",
	"Apache-2.0",
	"Apache-2.0 WITH LLVM-exception",
	"BSD-3-Clause",
	"ISC",
	"Unicode-3.0",
	"Zlib",
	"0BSD",
	"Unlicense",
	"CC0-1.0",
	"MIT-0",
	"MPL-2.0",
	# ffmpeg-next / ffmpeg-sys-next(Rust バインディングクレート自体)のライセンス。
	# WTFPL は FSF Free/Libre 認定の緩いライセンスで配布上の懸念はない。
	# 注意: これはあくまで「Rust バインディングコード」のライセンスであり、実行時に
	# 動的リンクする FFmpeg 共有ライブラリ本体の GPL/LGPL とは別問題(deny.toml 冒頭の
	# コメント・配布ガードは Phase 4 課題、を参照)。
	"WTFPL",
	# webpki-root-certs(ルート証明書データのみを含むクレート。コードではなくデータの
	# ライセンス)。Phase 4 Wave C で tauri-plugin-updater を追加したことで
	# reqwest → rustls-platform-verifier 経由の推移的依存として入る。permissive で
	# 配布上の懸念はない。
	"CDLA-Permissive-2.0",
]

[licenses.private]
# apps/desktop 配下の自社クレート(contract-rs / media-core / facet-desktop)は
# publish = false(workspace.package 経由)で crates.io 非公開のため、
# ライセンス判定の対象から外す。
ignore = true

[bans]
# tauri 系の依存木は同一クレートの複数バージョン混在が珍しくないため warn に留める
# (deny にすると tauri 側の更新のたびに CI が壊れる)。
multiple-versions = "warn"
wildcards = "allow"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
