[package]
name = "facet-desktop"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Facet desktop app (Tauri v2 shell)"
license = ""
repository = ""
default-run = "facet-desktop"

[lib]
# tauri のモバイルエントリポイント生成に必要な crate-type
crate-type = ["staticlib", "cdylib", "rlib"]
name = "facet_desktop_lib"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# reframe/probe コマンドの実処理(Wave 5: コマンド境界の配線)。
media-core = { path = "../crates/media-core" }
# ジョブ ID の発行(reframe_start が返す JobId)。
uuid = { version = "1", features = ["v4"] }
