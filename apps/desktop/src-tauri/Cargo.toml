[package]
name = "facet-desktop"
version.workspace = true
edition.workspace = true
publish.workspace = true
description = "Facet desktop app (Tauri v2 shell)"
license = ""
repository = ""
default-run = "facet-desktop"

[lib]
# tauri のモバイルエントリポイント生成に必要な crate-type
crate-type = ["staticlib", "cdylib", "rlib"]
name = "facet_desktop_lib"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
